        $ref: "#/components/schemas/CorsRule"
      minItems: 1
      maxItems: 100
    MaxAgeSeconds:
      type: integer
      minimum: 0
      maximum: 2147483647
    ExposeHeaders:
      type: array
      items:
        $ref: "#/components/schemas/Header"
      minItems: 0
      maxItems: 100
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
      minItems: 1
      maxItems: 200
    LifecyclePolicy:
      type: string
      pattern: "[\\u0009\\u000A\\u000D\\u0020-\\u00FF]+"
      minLength: 0
      maxLength: 8192
    MetricPolicy:
      type: object
      required:
      - ContainerLevelMetrics
      properties:
        ContainerLevelMetrics:
          allOf:
          - $ref: "#/components/schemas/ContainerLevelMetrics"
          - description: A setting to enable or disable metrics at the container level.
        MetricPolicyRules:
          allOf:
          - $ref: "#/components/schemas/MetricPolicyRules"
          - description: A parameter that holds an array of rules that enable metrics at the object level. This parameter is optional, but if you choose to include it, you must also include at least 
              one rule. By default, you can include up to five rules. You can also <a href="https://console.aws.amazon.com/servicequotas/home?region=us-east-1#!/services/mediastore/quotas">request a 
              quota increase</a> to allow up to 300 rules per policy.
      description: <p>The metric policy that is associated with the container. A metric policy allows AWS Elemental MediaStore to send metrics to Amazon CloudWatch. In the policy, you must indicate 
        whether you want MediaStore to send container-level metrics. You can also include rules to define groups of objects that you want MediaStore to send object-level metrics for.</p> <p>To view 
        examples of how to construct a metric policy for your use case, see <a href="https://docs.aws.amazon.com/mediastore/latest/ug/policies-metric-examples.html">Example Metric Policies</a>.</p>
    PaginationToken:
      type: string
      pattern: "[0-9A-Za-z=/+]+"
      minLength: 1
      maxLength: 1024
    MetricPolicyRules:
      type: array
      items:
        $ref: "#/components/schemas/MetricPolicyRule"
      minItems: 1
      maxItems: 300
    ObjectGroup:
      type: string
      pattern: /?(?:[A-Za-z0-9_=:\.\-\~\*]+/){0,10}(?:[A-Za-z0-9_=:\.\-\~\*]+)?/?
      minLength: 1
      maxLength: 900
    ObjectGroupName:
      type: string
      pattern: "[a-zA-Z0-9_]+"
      minLength: 1
      maxLength: 30
    MetricPolicyRule:
      type: object
      required:
      - ObjectGroup
      - ObjectGroupName
      properties:
        ObjectGroup:
          allOf:
          - $ref: "#/components/schemas/ObjectGroup"
          - description: A path or file name that defines which objects to include in the group. Wildcards (*) are acceptable.
        ObjectGroupName:
          allOf:
          - $ref: "#/components/schemas/ObjectGroupName"
          - description: A name that allows you to refer to the object group.
      description: A setting that enables metrics at the object level. Each rule contains an object group and an object group name. If the policy includes the MetricPolicyRules parameter, you must 
        include at least one rule. Each metric policy can include up to five rules by default. You can also <a 
        href="https://console.aws.amazon.com/servicequotas/home?region=us-east-1#!/services/mediastore/quotas">request a quota increase</a> to allow up to 300 rules per policy.
    TagKey:
      type: string
      pattern: "[\\p{L}\\p{Z}\\p{N}_.:/=+\\-@]*"
      minLength: 1
      maxLength: 128
    TagValue:
      type: string
      pattern: "[\\p{L}\\p{Z}\\p{N}_.:/=+\\-@]*"
      minLength: 0
      maxLength: 256
    Tag:
      type: object
      required:
      - Key
      properties:
        Key:
          allOf:
          - $ref: "#/components/schemas/TagKey"
          - description: Part of the key:value pair that defines a tag. You can use a tag key to describe a category of information, such as "customer." Tag keys are case-sensitive.
        Value:
          allOf:
          - $ref: "#/components/schemas/TagValue"
          - description: Part of the key:value pair that defines a tag. You can use a tag value to describe a specific value within a category, such as "companyA" or "companyB." Tag values are 
              case-sensitive.
      description: A collection of tags associated with a container. Each tag consists of a key:value pair, which can be anything you define. Typically, the tag key represents a category (such as 
        "environment") and the tag value represents a specific value within that category (such as "test," "development," or "production"). You can add up to 50 tags to each container. For more 
        information about tagging, including naming and usage conventions, see <a href="https://docs.aws.amazon.com/mediastore/latest/ug/tagging.html">Tagging Resources in MediaStore</a>.
    TagKeyList:
      type: array
      items:
        $ref: "#/components/schemas/TagKey"
