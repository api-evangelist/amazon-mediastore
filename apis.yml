aid: amazon-mediastore
name: Amazon MediaStore
description: >-
  AWS Elemental MediaStore is a video origination and storage service that
  offers the performance, consistency, and low latency required to deliver
  live streaming video content. It provides high performance storage with
  built-in access management for video workloads.
